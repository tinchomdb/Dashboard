<div class="relative h-full overflow-hidden">
  <div class="absolute top-xs right-xs z-10 flex items-center gap-xs">
    @if (actionsOpen()) {
      <div class="flex items-center gap-xs bg-surface-overlay rounded-sm p-2xs">
        <span
          class="widget-drag-handle pi pi-arrows-alt cursor-grab active:cursor-grabbing p-sm text-text-muted text-sm"
          aria-label="Drag to reorder"
        ></span>
        <p-button
          icon="pi pi-times"
          [rounded]="true"
          [text]="true"
          severity="danger"
          size="small"
          (onClick)="onRemove()"
          aria-label="Remove widget"
        />
      </div>
    }
    <p-button
      icon="pi pi-ellipsis-v"
      [rounded]="true"
      [text]="true"
      severity="secondary"
      size="small"
      (onClick)="actionsOpen.set(!actionsOpen())"
      aria-label="Widget actions"
    />
  </div>

  @if (widget().loading) {
    <div class="flex flex-col h-full p-md bg-surface-card rounded-md">
      <p-skeleton width="60%" height="1rem" styleClass="mb-2" />
      <p-skeleton width="40%" height="0.75rem" styleClass="mb-4" />
      <p-skeleton width="100%" height="100%" />
    </div>
  } @else {
    @if (widget().type === 'kpi') {
      <app-kpi-card [title]="widget().title" [value]="$any(widget().data)?.value ?? '--'" />
    } @else if (widget().type === 'stat') {
      <app-stat-card
        [title]="widget().title"
        [value]="$any(widget().data)?.value ?? '--'"
        [badge]="$any(widget().data)?.badge"
        [badgeSeverity]="$any(widget().data)?.badgeSeverity ?? 'info'"
      />
    } @else if (isChartWidget()) {
      <app-chart-card
        [title]="widget().title"
        [subtitle]="widget().subtitle"
        [chartType]="chartType()"
        [chartData]="$any(widget().data)"
        [chartOptions]="chartOptions()"
      />
    }
  }
</div>
